name: Build builder image
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  builder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - uses: ./.github/actions/mask-registry-passwords

      - name: Generate tags
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/eeems/arkes-builder
          HASH="$(python ./make/hash-niricfg.py --no-newline)"
          echo "tags=${IMAGE_NAME}:niricfg,${IMAGE_NAME}:${HASH}" >> $GITHUB_OUTPUT
          echo "missing=$(skopeo list-tags docker://$IMAGE_NAME | jq --arg hash "$HASH" 'any(.Tags[]; . == $hash) | not')" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT

      - name: Build and push
        if: fromJson(steps.meta.outputs.missing)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/niricfg/Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
